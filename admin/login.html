<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | لوحة التحكم - Green Apple</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-mode');
      } else {
        document.documentElement.classList.remove('light-mode');
      }
      const savedLang = localStorage.getItem('lang') || 'ar';
      document.documentElement.dir = savedLang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = savedLang;
    })();
  </script>
</head>
<body class="rtl">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="apple-spinner"></div>
    <div class="loading-logo">Green Apple</div>
  </div>

  <div class="admin-login-layout">
    <div class="admin-login-card glass">
      
      <div style="text-align: center; margin-bottom: 30px;">
        <i class="fa-brands fa-apple" style="font-size: 3rem; color: var(--primary); margin-bottom: 12px;"></i>
        <h2 style="font-size: 1.8rem; font-weight: 800;">
          <span class="lang-ar">لوحة تحكم جرين ابل</span>
          <span class="lang-en">Green Apple Admin</span>
        </h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 6px;">
          <span class="lang-ar">أدخل بيانات الاعتماد للمتابعة</span>
          <span class="lang-en">Sign in to manage your e-commerce store</span>
        </p>
      </div>

      <!-- Error Alert Box -->
      <div id="login-error-alert" style="display: none; padding: 12px 16px; border-radius: var(--btn-radius); background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.9rem; margin-bottom: 20px; font-weight: 600; text-align: center;">
        <span class="lang-ar">اسم المستخدم أو كلمة المرور غير صحيحة!</span>
        <span class="lang-en">Invalid username or password!</span>
      </div>

      <form id="admin-login-form">
        <div class="admin-form-group">
          <label for="username">
            <span class="lang-ar">اسم المستخدم</span>
            <span class="lang-en">Username</span>
          </label>
          <input type="text" id="username" class="admin-form-input" required autocomplete="username" placeholder="e.g. admin">
        </div>

        <div class="admin-form-group">
          <label for="password">
            <span class="lang-ar">كلمة المرور</span>
            <span class="lang-en">Password</span>
          </label>
          <input type="password" id="password" class="admin-form-input" required autocomplete="current-password" placeholder="••••••••">
        </div>

        <div class="admin-checkbox-group" style="margin-top: 10px; margin-bottom: 30px;">
          <input type="checkbox" id="remember-me">
          <label for="remember-me" style="cursor: pointer; font-size: 0.85rem; color: var(--text-muted); user-select: none;">
            <span class="lang-ar">تذكر تسجيل الدخول</span>
            <span class="lang-en">Remember login session</span>
          </label>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span class="lang-ar">تسجيل الدخول</span>
          <span class="lang-en">Sign In</span>
        </button>
      </form>

      <!-- Language/Theme selection buttons -->
      <div style="display: flex; justify-content: center; gap: 12px; margin-top: 30px;">
        <button class="action-btn" id="lang-toggle-btn"><i class="fa-solid fa-globe"></i></button>
        <button class="action-btn" id="theme-toggle-btn"><i class="fa-solid fa-moon"></i></button>
      </div>

    </div>
  </div>

  <script src="../js/script.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
